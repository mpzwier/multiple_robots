### ekf config file ###
/**/ekf_filter_node:
    ros__parameters:
# The frequency, in Hz, at which the filter will output a position estimate. Note that the filter will not begin
# computation until it receives at least one message from one of the inputs. It will then run continuously at the
# frequency specified here, regardless of whether it receives more measurements. Defaults to 30 if unspecified.
        frequency: 30.0

# ekf_localization_node and ukf_localization_node both use a 3D omnidirectional motion model. If this parameter is
# set to true, no 3D information will be used in your state estimate. Use this if you are operating in a planar
# environment and want to ignore the effect of small variations in the ground plane that might otherwise be detected
# by, for example, an IMU. Defaults to false if unspecified.
        two_d_mode: true

# Whether to publish the acceleration state. Defaults to false if unspecified.
        publish_acceleration: true

# Whether to broadcast the transformation over the /tf topic. Defaults to true if unspecified.
        publish_tf: true

# The frame names should be relative to and not set to a global
        map_frame: map                  # Defaults to "map" if unspecified
        odom_frame: odom                # Defaults to "odom" if unspecified
        base_link_frame: base_footprint # Defaults to "base_link" if unspecified
        world_frame: odom               # Defaults to the value of odom_frame if unspecified

# odom0 and imu0 are linked to the topics of the robot, because this is a yaml, namespace for these topics should be set by hand
# for these topics, so /robot1/......
        odom0: /robot3/odom
        odom0_config: [false, false, false,
                      false, false, false,
                      true, true, false,
                      false, false, true,
                      false, false, false]

        imu0: /robot3/imu
        imu0_config: [false, false, false,
                      false, false, false,
                      false, false, false,
                      false, false, true,
                      false, false, false]
        imu0_remove_gravitational_acceleration: true 